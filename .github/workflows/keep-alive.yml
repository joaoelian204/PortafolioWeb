name: Supabase Keep Alive

on:
  schedule:
    # Se ejecuta todos los lunes y jueves a las 00:00 UTC
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send Keep-Alive Query
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/profile_info?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Content-Type: application/json"
